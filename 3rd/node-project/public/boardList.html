<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h3>게시글목록</h3>
    <table border="2">
      <thead>
        <tr>
          <th>글번호</th>
          <th>제목</th>
          <th>작성자</th>
          <th>작성일자</th>
          <th>이미지</th>
        </tr>
      </thead>
      <tbody id="blist"></tbody>
    </table>

    <script>
      // HTML escape (XSS 방지)
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // 이미지 요청 함수
      async function getImage(filename) {
        try {
          const resp = await fetch("board/image/" + filename);
          if (!resp.ok) return null;

          const result = await resp.json();
          return result.file; // Base64 문자열
        } catch (err) {
          console.warn("이미지 로딩 실패:", filename, err);
          return null;
        }
      }

      // 게시글 목록 가져오기
      fetch("board/boards")
        .then((resp) => resp.json())
        .then(async (result) => {
          const tbody = document.querySelector("#blist");

          for (let elem of result) {
            const tr = document.createElement("tr");

            // 기본 텍스트 내용
            const id = escapeHtml(String(elem.board_id));
            const title = escapeHtml(elem.title);
            const author = escapeHtml(elem.author);
            const date = escapeHtml(elem.create_date);

            // 이미지 처리
            let imgTag = "";
            if (elem.images) {
              const base64 = await getImage(elem.images);
              if (base64) {
                imgTag = `<img src="data:image/*;base64,${base64}" width="80" />`;
              }
            }

            tr.innerHTML = `
              <td>${id}</td>
              <td>${title}</td>
              <td>${author}</td>
              <td>${date}</td>
              <td>${imgTag}</td>
            `;

            tbody.appendChild(tr);
          }
        })
        .catch((err) => console.error("게시글 로딩 오류:", err));
    </script>
  </body>
</html>
