<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 등록</title>
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        padding: 50px;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
      }
      h3 {
        margin-bottom: 20px;
        color: #333;
        border-left: 5px solid #007bff;
        padding-left: 10px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
      }
      textarea {
        height: 150px;
        resize: none;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>게시글 등록</h3>
      <form action="/submit" method="post">
        <div class="form-group">
          <label for="title">제목</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="제목을 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="author">작성자</label>
          <input
            type="text"
            id="author"
            name="author"
            placeholder="작성자 성함"
            required
          />
        </div>
        <div class="form-group">
          <label for="content">내용</label>
          <textarea
            id="content"
            name="content"
            placeholder="내용을 작성해주세요"
            required
          ></textarea>
        </div>
        <button type="submit">등록하기</button>
      </form>
    </div>
    <script>
      // fetch 활용해서 등록.
      document
        .querySelector("form") //
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const content = document.querySelector("#content").value;
          const postData = {
            title: document.querySelector("#title").value,
            content: content
              .split("\n")
              .map((elem) => `<p>${elem}</p>`)
              .join(""),
            writerId: document.querySelector("#author").value,
          };
          if (!postData.title || !postData.content || !postData.writerId) {
            return;
          }
          fetch("./api/board", {
            method: "post",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + localStorage.getItem("token"),
            },
            body: JSON.stringify({
              title: postData.title,
              content: postData.content,
            }),
          })
            .then((resp) => resp.json())
            .then((data) => {
              if (data.retCode == "OK") {
                // 성공 후 이동할 페이지 (글목록페이지)
                alert("[등록 성공] 글목록으로 이동.");
                location.href = "boardList.html";
              } else {
                // 실패 후 에러메세지 (결과를 화면에 출력)
                alert(`[에러] ${data.retMsg}`);
              }
            })
            .catch(console.log);
        });
    </script>
  </body>
</html>
