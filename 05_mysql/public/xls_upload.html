<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엑셀 업로드</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f7f6;
      }
      .upload-container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 350px;
      }
      h3 {
        margin-top: 0;
        color: #333;
      }
      .file-input-label {
        display: block;
        padding: 15px;
        border: 2px dashed #cbd5e0;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
        margin-bottom: 1rem;
      }
      .file-input-label:hover {
        background-color: #edf2f7;
      }
      #excelFile {
        display: none;
      }
      #fileName {
        font-size: 0.9rem;
        color: #718096;
        margin-bottom: 1rem;
        word-break: break-all;
      }
      button {
        background-color: #4299e1;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        width: 100%;
      }
      button:hover {
        background-color: #3182ce;
      }
    </style>
  </head>
  <body>
    <div class="upload-container">
      <h3>엑셀 업로드</h3>
      <form id="uploadForm">
        <!-- .xlsx 및 .xls 파일만 허용 -->
        <label for="excelFile" class="file-input-label">
          클릭하여 엑셀 파일 선택
          <input type="file" id="excelFile" accept=".xlsx, .xls" required />
        </label>
        <div id="fileName">선택된 파일 없음</div>
        <button type="submit">업로드 하기</button>
      </form>
    </div>

    <script>
      const fileInput = document.getElementById("excelFile");
      const fileNameDisplay = document.getElementById("fileName");

      // 파일 선택 시 이름 표시
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        fileNameDisplay.textContent = file
          ? `선택됨: ${file.name}`
          : "선택된 파일 없음";
      });

      // 전송 버튼 클릭 시 동작 (실제 서버 연결 시 fetch 사용 필요)
      document.getElementById("uploadForm").onsubmit = (e) => {
        e.preventDefault();
        if (!fileInput.files[0]) return alert("파일을 선택해주세요!");

        // multipart 요청.
        const formData = new FormData();
        formData.append("myFile", fileInput.files[0]);

        // 파일업로드 호출.
        fetch("api/excel_upload", {
          method: "post",
          body: formData,
        })
          .then((resp) => resp.json())
          .then((data) => {
            console.log(data);
            if (data.retCode == "OK") {
              alert("Success");
              fileNameDisplay.textContent = data.retMsg;
            } else {
              alert("Failure");
              fileNameDisplay.textContent = data.retMsg;
            }
          })
          .catch(console.error);
      };
    </script>
  </body>
</html>
